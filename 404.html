<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Page introuvable — Wilfried Bemelingue</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: monospace;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            text-align: center;
            padding: 24px;
        }
        .logo { font-size: 2rem; font-weight: 900; letter-spacing: -0.05em; }
        .logo span { color: #38B2AC; }
        .code { font-size: 5rem; font-weight: 900; color: #38B2AC; line-height: 1; }
        .msg { font-size: 1.1rem; color: #94a3b8; max-width: 360px; line-height: 1.6; }
        a {
            display: inline-block;
            margin-top: 8px;
            padding: 10px 28px;
            background: #38B2AC;
            color: #0f172a;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        a:hover { opacity: 0.85; }
    </style>
    <script>
        // Redirect to home after 4 seconds
        setTimeout(() => { window.location.href = "/"; }, 4000);
    </script>
</head>
<body>
    <div class="logo"><span>&lt;</span>W<span>/</span>B<span>&gt;</span></div>
    <div class="code">404</div>
    <p class="msg">Cette page n'existe pas.<br/>Redirection automatique dans 4 secondes…</p>
    <a href="/">← Retour à l'accueil</a>
</body>
</html>
